<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Extension</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body id="warris-body">
    <div class="waris-content">
      <button id="close-overlay">✕</button>

      <h2>📩 WhatsApp Bulk Tool</h2>

      <!-- Select Operation -->
      <div class="opsContainer">
        <label for="operation">Choose Operation</label>
        <select id="operation">
          <option value="bulk">Send Bulk Messages</option>
          <option value="verify">Verify Numbers Only</option>
        </select>
      </div>

      <!-- Upload File -->
      <div class="fileUpload">
        <label for="fileInput">Upload CSV or Excel</label>
        <input
          type="file"
          id="fileInput"
          accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel"
        />
      </div>

      <!-- Column Headers -->
      <div id="headerSelectSection" class="hidden">
        <div>
          <label for="phoneHeaderSelect">Phone Number Column</label>
          <select id="phoneHeaderSelect"></select>
        </div>
        <div>
          <label for="messageHeaderSelect">Message Column</label>
          <select id="messageHeaderSelect"></select>
        </div>
      </div>

      <!-- Start Button -->
      <div class="button-container">
        <button id="startBtn">🚀 Start</button>
        <button id="stopBtn">❌ Stop</button>
      </div>

      <!-- Status Log -->
      <div class="statusContainer">
        <label for="statusLog">Status Log</label>
        <div id="statusLog"></div>
      </div>
    </div>

    <script type="text/javascript" src="./libs/xlsx.full.min.js"></script>
    <script type="text/javascript" src="popup.js"></script>
  </body>
</html>
